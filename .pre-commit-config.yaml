default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: test-gate
        name: Run Full Test Gate
        entry: ./test_gate.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-push]
